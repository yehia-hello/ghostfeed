<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="description" content="GhostFeed - Anonymous, encrypted social platform">
    <meta name="theme-color" content="#000000">
    <title>GhostFeed — Anonymous Realm</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- INTRO OVERLAY WITH LOGIN -->
<div class="intro-overlay" id="introOverlay">
    <div class="login-modal">
        <div class="login-title">GhostFeed</div>
        <div class="login-sub">enter the anonymous void</div>
        
        <div class="input-group">
            <input type="email" id="loginEmail" placeholder="Email">
        </div>
        <div class="input-group">
            <input type="password" id="loginPassword" placeholder="Password">
        </div>
        <button class="google-btn" id="loginBtn">Login</button>
        <button class="google-btn" id="signupBtn">Sign Up</button>
        <div class="divider">or</div>
        <button class="skip-btn" id="skipBtn">Continue as Anonymous</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<!-- MAIN APP -->
<div class="main-app" id="mainApp">
    <canvas id="particle-canvas"></canvas>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">
                    <img src="https://i.ibb.co/9k53SFRb/Chat-GPT-Image-Apr-20-2026-10-32-28-PM.png" alt="logo">
                </div>
                <h1>GhostFeed</h1>
            </div>
            <div class="user-info" id="userInfo" style="display: none;">
                <img class="user-avatar" id="userAvatar" src="">
                <span class="user-name" id="userNameDisplay"></span>
                <span class="verified-badge" id="verifiedBadge" style="display: none;"><i class="fa-solid fa-circle-check"></i></span>
                <span class="admin-badge" id="adminBadge" style="display: none;">DEV</span>
                <button id="logoutBtn" class="logout-btn"><i class="fa-regular fa-sign-out"></i></button>
            </div>
            <button class="activity-main-btn" id="activityPageBtn">
                <i class="fa-regular fa-bell"></i>
                <span>Activity</span>
                <span class="badge" id="headerBadge">0</span>
            </button>
        </div>

        <div class="composer">
            <textarea id="postInput" class="text-input" rows="2" placeholder="whisper into the void..."></textarea>
            <div class="image-preview-row" id="previewRow"></div>
            <div class="publish-row">
                <button class="small-btn" id="attachImgBtn"><i class="fa-regular fa-image"></i> Image</button>
                <button class="publish-btn" id="publishBtn"><i class="fa-regular fa-paper-plane"></i> Publish</button>
            </div>
            <input type="file" id="imageUploader" accept="image/*" style="display:none">
        </div>

        <div id="feedContainer">
            <div class="loading-spinner"><i class="fa-regular fa-ghost"></i> Loading echoes...</div>
        </div>
        <div class="footer">anonymous · encrypted · realtime</div>
    </div>
    <div class="toast" id="toastMsg"></div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/posts.js"></script>
<script src="js/comments.js"></script>
<script src="js/likes.js"></script>
<script src="js/admin.js"></script>
<script src="js/app.js"></script>
</body>
</html>
